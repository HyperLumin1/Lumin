<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="black"/>
  <!-- The L shape -->
  <path d="M160 100V412H320" stroke="white" stroke-width="85" stroke-linecap="butt" stroke-linejoin="miter"/>
  <!-- The orange dot with glow -->
  <defs>
    <filter id="glow" x="300" y="300" width="200" height="200" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <circle cx="410" cy="412" r="40" fill="#FF5C00" filter="url(#glow)"/>
</svg>
